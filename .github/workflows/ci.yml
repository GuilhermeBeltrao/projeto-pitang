name: ci

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: reembolsos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/reembolsos_test
      DATABASE_TEST_URL: postgresql://postgres:postgres@localhost:5432/reembolsos_test
      JWT_SECRET: changeme
      JWT_EXPIRES_IN: 1d
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - name: Install dependencies
        run: npm install
      - name: Backend prisma generate
        run: npm --workspace backend run prisma:generate
      - name: Backend migrate
        run: npm --workspace backend run prisma:deploy
      - name: Backend tests
        run: npm --workspace backend run test
      - name: Frontend tests
        run: npm --workspace frontend run test
